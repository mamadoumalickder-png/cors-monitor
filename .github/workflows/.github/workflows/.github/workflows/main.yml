name: CORS Monitor 24/7

on:
  schedule:
    - cron: '*/10 * * * *'  # S'exécute toutes les 10 minutes
  workflow_dispatch:      # Permet le lancement manuel

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Monitor
        run: python github_cors_monitor.py

      - name: Commit and push if state changed
        run: |
          git config --global user.name 'CORS-Bot'
          git config --global user.email 'bot@cors.com'
          git add seen_posts.json
          git commit -m "Update seen posts state" || exit 0
          git push
